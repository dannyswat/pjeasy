services:
  postgres:
    image: postgres:16-alpine
    container_name: pjeasy-postgres
    environment:
      POSTGRES_DB: pjeasy
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d pjeasy"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: pjeasy-app
    depends_on:
      postgres:
        condition: service_healthy
    command: ["-config", "config.compose.json"]
    ports:
      - "8080:8080"
    volumes:
      - ./config.compose.json:/app/config.compose.json:ro
      - uploads-data:/app/uploads

volumes:
  postgres-data:
  uploads-data: